apiVersion: v1
kind: Secret
metadata:
  name: interviewos-secrets
  namespace: interviewos
  labels:
    app.kubernetes.io/part-of: interviewos
type: Opaque
# IMPORTANT: these are PLACEHOLDER values for local/dry-run only. Override every
# value before deploying to a real cluster — e.g. with a sealed-secret, an
# external-secrets operator, `kubectl create secret generic interviewos-secrets
# --from-literal=...`, or a CI secret injection step. Never commit real secrets.
stringData:
  # Full Postgres DSN consumed by the backend (DATABASE_URL). Host points at the
  # in-cluster Postgres Service. Replace the password with a strong value and
  # keep it in sync with POSTGRES_PASSWORD below.
  DATABASE_URL: "postgres://interviewos:CHANGE_ME_POSTGRES_PASSWORD@interviewos-postgres:5432/interviewos?sslmode=disable"
  # JWT signing secret — MUST be a long random value in production.
  JWT_SECRET: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET"
  # Anthropic / Claude API key. Optional: leave blank to run with AI disabled.
  ANTHROPIC_API_KEY: ""
  # Postgres bootstrap credentials (used by the Postgres StatefulSet).
  POSTGRES_USER: "interviewos"
  POSTGRES_PASSWORD: "CHANGE_ME_POSTGRES_PASSWORD"
  POSTGRES_DB: "interviewos"
