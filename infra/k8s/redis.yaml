apiVersion: v1
kind: Service
metadata:
  name: interviewos-redis
  namespace: interviewos
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: interviewos
spec:
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: interviewos
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: interviewos-redis
  namespace: interviewos
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: interviewos
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/part-of: interviewos
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: interviewos
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - name: redis
              containerPort: 6379
          volumeMounts:
            - name: redisdata
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        # Ephemeral by default; swap for a PVC if you need persistence across
        # pod restarts. Redis here is an accelerator (cache/session/rate-limit),
        # not a system of record (see docs/03-ARCHITECTURE.md §11).
        - name: redisdata
          emptyDir: {}
