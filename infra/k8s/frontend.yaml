apiVersion: v1
kind: Service
metadata:
  name: interviewos-frontend
  namespace: interviewos
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: interviewos
spec:
  selector:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: interviewos
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: interviewos-frontend
  namespace: interviewos
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: interviewos
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
      app.kubernetes.io/part-of: interviewos
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: interviewos
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: frontend
          # See kustomization.yaml: build & push this tag, or `kind load` it.
          image: interviewos-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: interviewos-config
                  key: NEXT_PUBLIC_API_BASE_URL
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
