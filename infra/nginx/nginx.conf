# InterviewOS — Nginx reverse proxy (local/dev edge).
# Routes /api/* to the Go backend and everything else to the Next.js frontend.

upstream interviewos_backend {
    server backend:8080;
}

upstream interviewos_frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;

    # Reasonable defaults
    client_max_body_size 10m;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # API → Go backend (versioned + health + swagger)
    location /api/ {
        proxy_pass http://interviewos_backend;
    }

    location = /healthz {
        proxy_pass http://interviewos_backend;
    }

    location = /readyz {
        proxy_pass http://interviewos_backend;
    }

    location /swagger {
        proxy_pass http://interviewos_backend;
    }

    # Everything else → Next.js frontend
    location / {
        proxy_pass http://interviewos_frontend;
    }
}
