{{- if .Values.migrate.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "interviewos.componentName" (dict "ctx" . "component" "migrate") }}
  labels:
    {{- include "interviewos.labels" . | nindent 4 }}
  annotations:
    # Run on install/upgrade, before the workloads roll. Recreate each release.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "interviewos.componentSelectorLabels" (dict "ctx" . "component" "migrate") | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: {{ toJson .Values.migrate.command }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "interviewos.secretName" . }}
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
{{- end }}
{{- if .Values.seed.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "interviewos.componentName" (dict "ctx" . "component" "seed") }}
  labels:
    {{- include "interviewos.labels" . | nindent 4 }}
  annotations:
    # After migrate (higher weight), before workloads. Idempotent (upsert).
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "interviewos.componentSelectorLabels" (dict "ctx" . "component" "seed") | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: seed
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: {{ toJson .Values.seed.command }}
          envFrom:
            - configMapRef:
                name: {{ include "interviewos.configName" . }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "interviewos.secretName" . }}
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
{{- end }}
