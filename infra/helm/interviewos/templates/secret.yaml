{{- if .Values.secrets.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "interviewos.secretName" . }}
  labels:
    {{- include "interviewos.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "interviewos.databaseUrl" . | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  POSTGRES_USER: {{ .Values.secrets.postgresUser | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  POSTGRES_DB: {{ .Values.secrets.postgresDb | quote }}
{{- end -}}
