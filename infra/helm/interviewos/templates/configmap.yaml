apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "interviewos.configName" . }}
  labels:
    {{- include "interviewos.labels" . | nindent 4 }}
data:
  ENV: {{ .Values.config.env | quote }}
  PORT: {{ .Values.config.port | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  REDIS_URL: {{ include "interviewos.redisUrl" . | quote }}
  CORS_ORIGINS: {{ .Values.config.corsOrigins | quote }}
  ACCESS_TOKEN_TTL: {{ .Values.config.accessTokenTtl | quote }}
  REFRESH_TOKEN_TTL: {{ .Values.config.refreshTokenTtl | quote }}
  RESET_TOKEN_TTL: {{ .Values.config.resetTokenTtl | quote }}
  AI_MODEL: {{ .Values.config.aiModel | quote }}
  AI_ENABLED: {{ .Values.config.aiEnabled | quote }}
  NEXT_PUBLIC_API_BASE_URL: {{ .Values.config.apiBaseUrl | quote }}
