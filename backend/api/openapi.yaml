openapi: 3.1.0
info:
  title: InterviewOS API
  version: 1.0.0
  summary: "REST API for InterviewOS — the interview-prep learning operating system (GA track: Backend SDE3)."
  description: |
    REST API under `/api/v1`. JWT bearer access tokens (short-lived) + rotating
    refresh tokens. All field names and enum values are consistent with
    `04-DATABASE-SCHEMA.md` and `05-API-CONTRACTS.md`.
  contact:
    name: InterviewOS Engineering
    email: eng@interviewos.app
  license:
    name: Proprietary

servers:
  - url: https://api.interviewos.app/api/v1
    description: Production
  - url: https://staging-api.interviewos.app/api/v1
    description: Staging
  - url: http://localhost:8080/api/v1
    description: Local

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Registration, login, OAuth, token refresh, password reset.
  - name: Profile
    description: Intake wizard & user profile.
  - name: Curriculum
    description: Roadmap generation, weeks, days, today, task lifecycle.
  - name: Content
    description: Tracks, pillars, topics, subtopics, resources browsing.
  - name: DSA
    description: Problems and patterns.
  - name: SystemDesign
    description: Design (HLD) problems.
  - name: BackendEngineering
    description: Backend-engineering depth topics.
  - name: LLD
    description: Low-level design problems.
  - name: Behavioral
    description: STAR behavioral stories.
  - name: Resume
    description: Resume profile, projects, scoring.
  - name: Mock
    description: Mock interviews and findings.
  - name: Revision
    description: Spaced-repetition revision engine.
  - name: Company
    description: Company mode (list, set target).
  - name: Analytics
    description: Readiness, streaks, weak/strong topics, snapshots.
  - name: Notifications
    description: In-app notifications.
  - name: AI
    description: AI assistants (planner, coach, reviewers, weakness detector).

paths:
  # ---------------- AUTH ----------------
  /auth/register:
    post:
      tags: [Auth]
      summary: Register with email/password
      security: []
      operationId: authRegister
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthTokensResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email/password
      security: []
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthTokensResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/oauth/{provider}/callback:
    get:
      tags: [Auth]
      summary: OAuth callback (google | github)
      security: []
      operationId: authOAuthCallback
      parameters:
        - name: provider
          in: path
          required: true
          schema: { type: string, enum: [google, github] }
        - name: code
          in: query
          required: true
          schema: { type: string }
        - name: state
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthTokensResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token, issue new access token
      security:
        - refreshAuth: []
      operationId: authRefresh
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthTokensResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke current refresh-token family
      operationId: authLogout
      responses:
        '204': { description: No Content }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request a password reset email
      security: []
      operationId: authForgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ForgotPasswordRequest' }
      responses:
        '202': { description: "Accepted (always, to avoid account enumeration)" }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using a token
      security: []
      operationId: authResetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResetPasswordRequest' }
      responses:
        '204': { description: No Content }
        '400': { $ref: '#/components/responses/BadRequest' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/me:
    get:
      tags: [Auth]
      summary: Get the authenticated user
      operationId: authMe
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me:
    get:
      tags: [Auth]
      summary: Get the authenticated user (alias of /auth/me)
      operationId: me
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    delete:
      tags: [Auth]
      summary: Delete my account (soft delete)
      description: >-
        Soft-deletes the authenticated user's account and all of their
        user-owned data (sets deleted_at), revokes every refresh token, and
        writes a security audit entry. Idempotent.
      operationId: deleteAccount
      responses:
        '204': { description: No Content }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /me/export:
    get:
      tags: [Auth]
      summary: Export my personal data
      description: >-
        Returns a JSON bundle of all data the authenticated user owns
        (profile, roadmap, progress, stories, resume, mocks, notifications,
        and more). The password hash is never included.
      operationId: exportMyData
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DataExport' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ---------------- PROFILE / INTAKE ----------------
  /profile:
    get:
      tags: [Profile]
      summary: Get my intake profile
      operationId: getProfile
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserProfile' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Profile]
      summary: Create or update intake profile
      operationId: upsertProfile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserProfileUpsert' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserProfile' }
        '422': { $ref: '#/components/responses/ValidationError' }

  # ---------------- CURRICULUM ----------------
  /roadmaps/generate:
    post:
      tags: [Curriculum]
      summary: Generate a personalized roadmap from intake
      operationId: generateRoadmap
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GenerateRoadmapRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Roadmap' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /roadmaps/active:
    get:
      tags: [Curriculum]
      summary: Get the active roadmap (weeks summary)
      operationId: getActiveRoadmap
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Roadmap' }
        '404': { $ref: '#/components/responses/NotFound' }

  /roadmaps/{roadmapId}/weeks/{weekNumber}:
    get:
      tags: [Curriculum]
      summary: Get a roadmap week with its days
      operationId: getRoadmapWeek
      parameters:
        - { name: roadmapId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: weekNumber, in: path, required: true, schema: { type: integer, minimum: 1 } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoadmapWeek' }
        '404': { $ref: '#/components/responses/NotFound' }

  /plan-days/{date}:
    get:
      tags: [Curriculum]
      summary: Get the plan day for a date
      operationId: getPlanDay
      parameters:
        - { name: date, in: path, required: true, schema: { type: string, format: date } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlanDay' }
        '404': { $ref: '#/components/responses/NotFound' }

  /today:
    get:
      tags: [Curriculum]
      summary: Get today's auto-generated plan
      operationId: getToday
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlanDay' }
        '404': { $ref: '#/components/responses/NotFound' }

  /tasks/{taskId}/complete:
    post:
      tags: [Curriculum]
      summary: Complete a task (confidence + time + notes)
      operationId: completeTask
      parameters:
        - { name: taskId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CompleteTaskRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CompleteTaskResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /tasks/{taskId}/skip:
    post:
      tags: [Curriculum]
      summary: Skip a task
      operationId: skipTask
      parameters:
        - { name: taskId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SkipTaskRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlanTask' }
        '404': { $ref: '#/components/responses/NotFound' }

  /tasks/{taskId}/start:
    post:
      tags: [Curriculum]
      summary: Mark a task in progress
      operationId: startTask
      parameters:
        - { name: taskId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlanTask' }
        '404': { $ref: '#/components/responses/NotFound' }

  /tasks/{taskId}/reopen:
    post:
      tags: [Curriculum]
      summary: Reopen a completed or skipped task (revert to pending)
      description: >-
        Reverts a completed or skipped task back to pending and undoes its
        completion side effects (progress row, study session, and streak
        counters). Idempotent for an already-pending task.
      operationId: reopenTask
      parameters:
        - { name: taskId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlanTask' }
        '404': { $ref: '#/components/responses/NotFound' }

  /tasks/{taskId}/reschedule:
    post:
      tags: [Curriculum]
      summary: Reschedule a task to another date
      operationId: rescheduleTask
      parameters:
        - { name: taskId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RescheduleTaskRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlanTask' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  # ---------------- CONTENT BROWSING ----------------
  /tracks:
    get:
      tags: [Content]
      summary: List tracks
      operationId: listTracks
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Query'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: '#/components/schemas/Track' } }

  /pillars:
    get:
      tags: [Content]
      summary: List pillars (filter by track)
      operationId: listPillars
      parameters:
        - { name: track_id, in: query, schema: { type: string, format: uuid } }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: '#/components/schemas/Pillar' } }

  /topics:
    get:
      tags: [Content]
      summary: List/browse topics with pagination, filter, sort, search
      operationId: listTopics
      parameters:
        - { name: track_id, in: query, schema: { type: string, format: uuid } }
        - { name: pillar_id, in: query, schema: { type: string, format: uuid } }
        - { name: pillar_type, in: query, schema: { $ref: '#/components/schemas/PillarType' } }
        - { name: difficulty, in: query, schema: { $ref: '#/components/schemas/Difficulty' } }
        - { name: priority, in: query, schema: { $ref: '#/components/schemas/Priority' } }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
        - $ref: '#/components/parameters/Query'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: '#/components/schemas/Topic' } }

  /topics/{topicId}:
    get:
      tags: [Content]
      summary: Get a topic with subtopics and resources
      operationId: getTopic
      parameters:
        - { name: topicId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TopicDetail' }
        '404': { $ref: '#/components/responses/NotFound' }

  /resources:
    get:
      tags: [Content]
      summary: List/browse resources
      operationId: listResources
      parameters:
        - { name: type, in: query, schema: { $ref: '#/components/schemas/ResourceType' } }
        - { name: topic_id, in: query, schema: { type: string, format: uuid } }
        - { name: difficulty, in: query, schema: { $ref: '#/components/schemas/Difficulty' } }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Query'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: '#/components/schemas/Resource' } }

  # ---------------- DSA ----------------
  /problems:
    get:
      tags: [DSA]
      summary: List DSA problems (filter by company, difficulty, pattern)
      operationId: listProblems
      parameters:
        - { name: difficulty, in: query, schema: { $ref: '#/components/schemas/Difficulty' } }
        - { name: pattern_id, in: query, schema: { type: string, format: uuid } }
        - { name: topic_id, in: query, schema: { type: string, format: uuid } }
        - { name: company_id, in: query, schema: { type: string, format: uuid } }
        - { name: source, in: query, schema: { $ref: '#/components/schemas/ProblemSourceName' } }
        - { name: solved, in: query, schema: { type: boolean } }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Query'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: '#/components/schemas/Problem' } }

  /problems/{problemId}:
    get:
      tags: [DSA]
      summary: Get a problem with patterns, sources, company frequency, progress
      operationId: getProblem
      parameters:
        - { name: problemId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProblemDetail' }
        '404': { $ref: '#/components/responses/NotFound' }

  /patterns:
    get:
      tags: [DSA]
      summary: List DSA patterns
      operationId: listPatterns
      parameters:
        - { name: track_id, in: query, schema: { type: string, format: uuid } }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Query'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: '#/components/schemas/Pattern' } }

  # ---------------- SYSTEM DESIGN ----------------
  /design-problems:
    get:
      tags: [SystemDesign]
      summary: List HLD design problems (ordered catalog)
      operationId: listDesignProblems
      parameters:
        - { name: difficulty, in: query, schema: { $ref: '#/components/schemas/Difficulty' } }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Query'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: '#/components/schemas/DesignProblem' } }

  /design-problems/{designProblemId}:
    get:
      tags: [SystemDesign]
      summary: Get a design problem with all sections
      operationId: getDesignProblem
      parameters:
        - { name: designProblemId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DesignProblemDetail' }
        '404': { $ref: '#/components/responses/NotFound' }

  /design-problems/{designProblemId}/progress:
    get:
      tags: [SystemDesign]
      summary: Get the caller's progress on a design problem
      operationId: getDesignProblemProgress
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: designProblemId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: OK (status is "not_started" when none recorded)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DesignProblemProgress' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [SystemDesign]
      summary: Record progress on a design problem (status + confidence)
      operationId: saveDesignProblemProgress
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: designProblemId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [not_started, in_progress, completed, needs_review] }
                confidence: { type: integer, minimum: 1, maximum: 5, nullable: true }
                time_spent_minutes: { type: integer, minimum: 0 }
                notes: { type: string, nullable: true }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DesignProblemProgress' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  # ---------------- BACKEND ENGINEERING ----------------
  /backend-engineering/topics:
    get:
      tags: [BackendEngineering]
      summary: List backend-engineering depth topics
      operationId: listBackendTopics
      parameters:
        - { name: difficulty, in: query, schema: { $ref: '#/components/schemas/Difficulty' } }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Query'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: '#/components/schemas/Topic' } }

  /backend-engineering/topics/{topicId}:
    get:
      tags: [BackendEngineering]
      summary: Get a backend-engineering topic with subtopics and resources
      operationId: getBackendTopic
      parameters:
        - { name: topicId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TopicDetail' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---------------- LLD ----------------
  /lld-problems:
    get:
      tags: [LLD]
      summary: List LLD problems
      operationId: listLLDProblems
      parameters:
        - { name: difficulty, in: query, schema: { $ref: '#/components/schemas/Difficulty' } }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Query'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: '#/components/schemas/LLDProblem' } }

  /lld-problems/{lldProblemId}:
    get:
      tags: [LLD]
      summary: Get an LLD problem with all sections
      operationId: getLLDProblem
      parameters:
        - { name: lldProblemId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LLDProblemDetail' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---------------- BEHAVIORAL ----------------
  /behavioral-stories:
    get:
      tags: [Behavioral]
      summary: List my behavioral stories
      operationId: listStories
      parameters:
