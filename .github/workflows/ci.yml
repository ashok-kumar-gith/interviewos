name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Go) — vet, build, unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      # go.sum is generated on first resolve until dependencies are committed.
      - name: Resolve modules
        run: go mod tidy
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      # Unit tests with the race detector. Integration tests that need Postgres
      # run in the dedicated `backend-integration` job below.
      - name: Unit tests
        run: go test -race -coverprofile=coverage.out ./...
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out
          if-no-files-found: warn

  backend-integration:
    name: Backend (Go) — integration tests (Postgres + Redis)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: interviewos
          POSTGRES_PASSWORD: interviewos
          POSTGRES_DB: interviewos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U interviewos -d interviewos"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://interviewos:interviewos@localhost:5432/interviewos?sslmode=disable
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-test-secret
      ENV: test
      LOG_LEVEL: error
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Resolve modules
        run: go mod tidy
      - name: Apply migrations
        run: go run ./cmd/migrate up
      # Integration tests touch shared Postgres/Redis state, so they MUST run
      # serially (-p 1) to avoid cross-package data races on the same database.
      - name: Integration tests (serial)
        run: go test ./... -p 1 -coverprofile=coverage.integration.out
      - name: Upload integration coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-coverage
          path: backend/coverage.integration.out
          if-no-files-found: warn

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Uses `npm install` (not `npm ci`) until package-lock.json is committed.
      - name: Install
        run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      # Clear any stale Next.js build cache so the build is reproducible in CI.
      - name: Clean build cache
        run: rm -rf .next
      - name: Build
        run: npm run build

  openapi:
    name: OpenAPI spec validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validator
        run: pip install openapi-spec-validator
      - name: Validate spec
        run: openapi-spec-validator backend/api/openapi.yaml

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, backend-integration, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t interviewos-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t interviewos-frontend:ci ./frontend
